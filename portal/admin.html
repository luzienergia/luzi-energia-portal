<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Luzi Energia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#080f1e; --bg2:#0d1830; --bg3:#111f3a; --border:#1a2d50;
  --teal:#4ecde4; --green:#22c55e; --gold:#f59e0b; --red:#ef4444;
  --yellow:#eab308; --text:#fff; --muted:#7a9bb5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hidden{display:none!important}
a{color:inherit;text-decoration:none}

/* ── TOPBAR */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(8,15,30,.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:62px;gap:12px;
}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:21px;letter-spacing:1px}
.logo span{color:var(--teal)}
.nav-links{display:flex;gap:6px}
.nav-link{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;
  letter-spacing:1px;text-transform:uppercase;color:var(--muted);
  padding:7px 12px;border-radius:6px;transition:all .2s;cursor:pointer;
  background:none;border:none;}
.nav-link:hover{color:#fff;background:var(--bg3)}
.nav-link.active{color:var(--teal)}
.topbar-r{display:flex;align-items:center;gap:10px}
.badge-adm{font-size:11px;color:var(--teal);border:1px solid rgba(78,205,228,.3);
  padding:4px 12px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px}
.save-status{font-size:10px;display:flex;align-items:center;gap:5px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;
  transition:color .3s}
.save-status.ok{color:var(--green)}
.save-status.saving{color:var(--yellow)}
.save-status.err{color:var(--red)}
.save-status.offline{color:var(--muted)}
.btn-sair{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;
  letter-spacing:1px;text-transform:uppercase;background:none;
  border:1px solid var(--border);color:var(--muted);padding:6px 12px;
  border-radius:6px;cursor:pointer;transition:all .2s}
.btn-sair:hover{border-color:var(--red);color:var(--red)}

/* ── LOGIN */
#v-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 24px 40px}
.login-card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px}
.ey{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
.lt{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:30px;margin-bottom:6px}
.ls{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5}
.fl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:13px 15px;font-size:14px;font-family:'Barlow',sans-serif;color:#fff;
  outline:none;margin-bottom:18px;transition:border-color .2s}
.fi:focus{border-color:var(--teal)}
.rem-row{display:flex;align-items:center;gap:8px;margin-bottom:22px;cursor:pointer}
.rem-row input{accent-color:var(--teal);width:15px;height:15px;cursor:pointer}
.rem-row span{font-size:12px;color:var(--muted)}
.btn-in{width:100%;padding:15px;background:var(--teal);color:var(--bg);border:none;
  border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:15px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  transition:opacity .2s;margin-bottom:10px}
.btn-in:hover{opacity:.85}
.btn-ghost{width:100%;padding:10px;background:none;border:none;color:var(--muted);
  font-size:12px;cursor:pointer;font-family:'Barlow',sans-serif;transition:color .2s}
.btn-ghost:hover{color:#fff}
.login-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  border-radius:7px;padding:9px 13px;font-size:12px;color:var(--red);margin-bottom:14px;display:none}

/* ── DASH */
#v-dash{padding-top:62px}
.dash-nav{background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;padding:0 28px;gap:2px;overflow-x:auto}
.dtab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;
  letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:13px 16px;
  cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;
  background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap}
.dtab:hover{color:#fff}
.dtab.active{color:var(--teal);border-bottom-color:var(--teal)}
.tpane{display:none;padding:26px 28px;max-width:1400px;margin:0 auto}
.tpane.active{display:block}

/* ── VISAO GERAL */
.vg-refresh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.vg-timestamp{font-size:11px;color:var(--muted)}
.btn-refresh{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;
  letter-spacing:1px;text-transform:uppercase;background:none;
  border:1px solid var(--border);color:var(--muted);padding:7px 14px;
  border-radius:6px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-refresh:hover{border-color:var(--teal);color:var(--teal)}
.btn-refresh.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Cartões de sumário */
.sum-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.sc-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-weight:700}
.sc-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:30px;margin-top:5px}

/* Lista de UCs */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-ln{flex:1;height:1px;background:var(--border)}
.sec-ttl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

.uc-list{display:flex;flex-direction:column;gap:6px}
.uc-row{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:14px 18px;display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all .2s;flex-wrap:wrap;
}
.uc-row:hover{background:var(--bg3);border-color:rgba(78,205,228,.2)}
.uc-row.expanded{border-color:var(--teal);border-bottom-left-radius:0;border-bottom-right-radius:0}
.uc-status-icon{font-size:18px;flex-shrink:0;width:26px;text-align:center}
.uc-nome{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;flex:1;min-width:120px}
.uc-num{font-family:monospace;font-size:10px;color:var(--muted)}
.uc-tipo-badge{font-size:10px;padding:2px 8px;border-radius:20px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.tb-ativo{background:rgba(78,205,228,.1);color:var(--teal)}
.tb-prop{background:rgba(122,155,181,.1);color:var(--muted)}
.tb-pass{background:rgba(234,179,8,.1);color:var(--yellow)}
.uc-pipeline{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-left:auto}
.pip{font-size:11px;padding:3px 9px;border-radius:20px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;white-space:nowrap}
.pip-ok{background:rgba(34,197,94,.12);color:var(--green)}
.pip-no{background:rgba(26,45,80,.6);color:var(--muted)}
.pip-err{background:rgba(239,68,68,.12);color:var(--red)}
.pip-pend{background:rgba(234,179,8,.12);color:var(--yellow)}
.uc-arrow{font-size:10px;color:var(--muted);flex-shrink:0;margin-left:4px}

/* Detalhe da UC */
.uc-detail{
  background:var(--bg3);border:1px solid var(--teal);
  border-top:none;border-radius:0 0 10px 10px;
  overflow:hidden;margin-bottom:6px;
}
.detail-inner{padding:22px 20px}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:20px}
.dg-item{background:var(--bg2);border-radius:8px;padding:12px 14px}
.dg-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-bottom:4px}
.dg-val{font-size:14px;font-weight:600}
.dg-val-big{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--gold)}

/* Pipeline detalhada */
.pipeline-steps{display:flex;gap:0;flex-wrap:wrap;margin-bottom:20px}
.ps{flex:1;min-width:110px;background:var(--bg2);border:1px solid var(--border);
  padding:12px;text-align:center;position:relative}
.ps:first-child{border-radius:8px 0 0 8px}
.ps:last-child{border-radius:0 8px 8px 0}
.ps+.ps{border-left:none}
.ps-icon{font-size:20px;display:block;margin-bottom:4px}
.ps-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-bottom:3px}
.ps-status{font-size:10px;font-weight:600}
.ps.st-ok{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04)}
.ps.st-ok .ps-status{color:var(--green)}
.ps.st-err{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04)}
.ps.st-err .ps-status{color:var(--red)}
.ps.st-pend{border-color:rgba(234,179,8,.3);background:rgba(234,179,8,.04)}
.ps.st-pend .ps-status{color:var(--yellow)}
.ps.st-no{border-color:var(--border);background:rgba(26,45,80,.3)}
.ps.st-no .ps-status{color:var(--muted)}

/* Info do cliente */
.cliente-info-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.ci{flex:1;min-width:140px;background:var(--bg2);border-radius:8px;padding:12px}

/* Linha digitável */
.linha-dig{background:var(--bg2);border:1px solid var(--border);border-radius:7px;
  padding:9px 12px;font-family:monospace;font-size:11px;color:var(--muted);
  margin-top:8px;word-break:break-all;letter-spacing:.5px}

/* Ações */
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.btn-act{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;
  letter-spacing:1px;text-transform:uppercase;padding:9px 16px;
  border-radius:7px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-act-teal{background:rgba(78,205,228,.1);border:1px solid rgba(78,205,228,.3);color:var(--teal)}
.btn-act-teal:hover{background:rgba(78,205,228,.15)}
.btn-act-ghost{background:none;border:1px solid var(--border);color:var(--muted)}
.btn-act-ghost:hover{border-color:var(--muted);color:#fff}

/* ── COBRANÇAS */
.cob-subtabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.cob-stab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;
  letter-spacing:1px;text-transform:uppercase;padding:8px 18px;border-radius:6px;
  background:var(--bg2);border:1px solid var(--border);color:var(--muted);
  cursor:pointer;transition:all .2s}
.cob-stab.active{background:rgba(78,205,228,.1);border-color:rgba(78,205,228,.3);color:var(--teal)}
.cob-stab:hover:not(.active){color:#fff;border-color:rgba(255,255,255,.15)}
.cob-row{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:8px;
  flex-wrap:wrap;transition:border-color .2s}
.cob-row:hover{border-color:rgba(78,205,228,.2)}
.cob-ico{font-size:22px;flex-shrink:0}
.cob-info{flex:1;min-width:160px}
.cob-type{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.cob-client{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px}
.cob-doc{font-size:11px;color:var(--muted);font-family:monospace;margin-top:2px}
.cob-mes{font-size:11px;color:var(--muted);margin-top:2px}
.cob-venc{font-size:12px;color:var(--muted);white-space:nowrap;text-align:right}
.cob-valor{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--gold);white-space:nowrap}
.cob-badge{font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;white-space:nowrap}
.cb-pago{background:rgba(34,197,94,.12);color:var(--green)}
.cb-aberto{background:rgba(234,179,8,.12);color:var(--yellow)}
.cb-vencido{background:rgba(239,68,68,.12);color:var(--red)}
.cob-empty{text-align:center;padding:48px 24px;color:var(--muted);font-size:14px}
.cob-group-hdr{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:20px 0 8px;
  padding-bottom:6px;border-bottom:1px solid var(--border)}

/* ── EXPAND CLIENTE */
.cl-card.expanded{border-color:var(--teal);border-bottom-left-radius:0;border-bottom-right-radius:0}
.cl-expand{background:var(--bg3);border:1px solid var(--teal);border-top:none;
  border-radius:0 0 12px 12px;overflow:hidden;margin-bottom:14px}
.cl-expand-inner{padding:20px}
.fat-row-adm{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--bg2);border-radius:8px;margin-bottom:6px;flex-wrap:wrap}
.fat-mes-adm{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;width:60px}
.fat-status-adm{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.fat-valor-adm{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;margin-left:auto}
.fat-venc-adm{font-size:11px;color:var(--muted);white-space:nowrap}
.chart-wrap-adm{height:180px;margin-bottom:16px}

/* ── USINAS E RATEIO */
.usina-blk{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:20px;overflow:hidden}
.usina-hdr{background:var(--bg3);padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.usina-nome{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px}
.usina-nome span{color:var(--teal)}
.usina-sub{font-size:11px;color:var(--muted);margin-top:3px}
.usina-badge{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;
  letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px}
.op{background:rgba(34,197,94,.15);color:var(--green)}
.nb{background:rgba(234,179,8,.15);color:var(--yellow)}

/* Rateio table */
.rt{width:100%;border-collapse:collapse;font-size:13px}
.rt th{text-align:left;padding:9px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--border)}
.rt td{padding:11px 20px;border-bottom:1px solid rgba(26,45,80,.5)}
.rt tr:last-child td{border-bottom:none}
.rt td:first-child{font-weight:600}
.td-mono{font-family:monospace;font-size:10px;color:var(--muted)}
.pct-bar{height:6px;border-radius:3px;background:rgba(78,205,228,.2);margin-top:4px}
.pct-fill{height:100%;border-radius:3px;background:var(--teal)}

/* % edit input */
.pct-input{background:var(--bg3);border:1px solid var(--border);border-radius:5px;
  padding:5px 8px;font-size:13px;color:var(--teal);font-weight:700;width:70px;
  font-family:'Barlow Condensed',sans-serif;outline:none;text-align:center}
.pct-input:focus{border-color:var(--teal)}
.pct-total{font-size:11px;padding:10px 20px;border-top:1px solid var(--border);
  background:rgba(17,31,58,.4);display:flex;justify-content:space-between;align-items:center}
.btn-salvar-rateio{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;
  letter-spacing:1px;text-transform:uppercase;background:var(--teal);color:var(--bg);
  border:none;padding:8px 16px;border-radius:6px;cursor:pointer;transition:opacity .2s}
.btn-salvar-rateio:hover{opacity:.85}

/* ── GESTÃO DE CLIENTES */
.btn-add{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;
  letter-spacing:1px;text-transform:uppercase;background:var(--teal);color:var(--bg);
  border:none;padding:10px 20px;border-radius:8px;cursor:pointer;
  transition:opacity .2s;margin-bottom:20px;display:inline-flex;align-items:center;gap:6px}
.btn-add:hover{opacity:.85}
.btn-export{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;
  letter-spacing:1px;text-transform:uppercase;background:none;
  border:1px solid var(--border);color:var(--muted);padding:10px 16px;
  border-radius:8px;cursor:pointer;transition:all .2s;margin-left:8px}
.btn-export:hover{border-color:var(--gold);color:var(--gold)}

.cl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.cl-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px}
.cl-card-nome{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;margin-bottom:3px}
.cl-card-uc{font-family:monospace;font-size:10px;color:var(--muted);margin-bottom:12px}
.cl-card-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);
  padding:4px 0;border-bottom:1px solid rgba(26,45,80,.4)}
.cl-card-row:last-child{border-bottom:none}
.cl-card-row strong{color:#fff}
.cl-card-actions{display:flex;gap:8px;margin-top:14px}
.btn-editar{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;
  letter-spacing:1px;text-transform:uppercase;background:rgba(78,205,228,.08);
  border:1px solid rgba(78,205,228,.2);color:var(--teal);padding:6px 12px;
  border-radius:6px;cursor:pointer;transition:all .2s;flex:1}
.btn-editar:hover{background:rgba(78,205,228,.15)}
.btn-remover{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;
  letter-spacing:1px;text-transform:uppercase;background:none;
  border:1px solid rgba(239,68,68,.2);color:rgba(239,68,68,.6);padding:6px 12px;
  border-radius:6px;cursor:pointer;transition:all .2s}
.btn-remover:hover{border-color:var(--red);color:var(--red)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:span 2}
.form-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-weight:700}
.form-input,.form-select{background:var(--bg3);border:1px solid var(--border);border-radius:7px;
  padding:10px 12px;font-size:13px;font-family:'Barlow',sans-serif;color:#fff;
  outline:none;width:100%;transition:border-color .2s}
.form-input:focus,.form-select:focus{border-color:var(--teal)}
.form-select option{background:var(--bg3)}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;
  letter-spacing:1px;text-transform:uppercase;background:none;

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════════════════
const ADMIN_HASH  = 'd69098f86e9e89c22f67391256c576531e0e3f2526c503d5644444479f74e31d';
const SERVER_URL  = 'http://localhost:8080';
const GH_REPO    = 'luzienergia/luzi-energia-portal';
const GH_PATH    = 'portal/data.json';
const GH_API     = `https://api.github.com/repos/${GH_REPO}/contents/${GH_PATH}`;
const GH_KEY     = 'luzi_ghtoken';

let modoLocal    = false;
let modoGitHub   = false;
let ghToken      = null;
let ghSHA        = null;
let saveTimer    = null;

// ── Detecta modo: local → GitHub → leitura ───────────────
async function detectarModo() {
  // 1. Tenta servidor local
  try {
    const r = await fetch(`${SERVER_URL}/api/ping`, {signal: AbortSignal.timeout(1200)});
    if (r.ok) {
      modoLocal = true;
      setSaveStatus('ok', '✓', 'Ao vivo');
      document.getElementById('save-status').classList.remove('hidden');
      return;
    }
  } catch {}

  // 2. Tenta token GitHub
  ghToken = localStorage.getItem(GH_KEY);
  if (ghToken) {
    try {
      const r = await fetch(GH_API, {
        headers: { Authorization: `Bearer ${ghToken}`, Accept: 'application/vnd.github.v3+json' },
        signal: AbortSignal.timeout(5000)
      });
      if (r.ok) {
        modoGitHub = true;
        setSaveStatus('ok', '☁️', 'Ao vivo');
        document.getElementById('save-status').classList.remove('hidden');
        return;
      }
    } catch {}
  }

  // 3. Sem acesso — mostra botão configurar
  setSaveStatus('offline', '⚙️', 'Configurar acesso');
  document.getElementById('save-status').classList.remove('hidden');
  document.getElementById('save-status').style.cursor = 'pointer';
  document.getElementById('save-status').onclick = configurarGitHub;
}

// ── Indicador de save na topbar ───────────────────────────
function setSaveStatus(cls, icon, txt) {
  const el = document.getElementById('save-status');
  const ic = document.getElementById('save-icon');
  const tx = document.getElementById('save-txt');
  el.className = `save-status ${cls}`;
  ic.textContent = icon;
  tx.textContent = txt;
}

// ── Configura token GitHub (uma vez só) ──────────────────
async function configurarGitHub() {
  const token = prompt(
    'Para editar de qualquer dispositivo, informe seu Token GitHub.\n\n' +
    'Gere em: github.com → Settings → Developer settings → Personal access tokens → Fine-grained tokens\n' +
    '(Permissão necessária: Contents → Read and write)\n\n' +
    'Cole o token abaixo (começa com github_pat_ ou ghp_):'
  );
  if (!token) return;
  localStorage.setItem(GH_KEY, token);
  ghToken = token;
  modoGitHub = true;
  setSaveStatus('ok', '☁️', 'Acesso configurado!');
  document.getElementById('save-status').style.cursor = 'default';
  document.getElementById('save-status').onclick = null;
  await loadData();
  renderAll();
}

// ── Salva via GitHub API (commit direto) ─────────────────
async function salvarGitHub() {
  try {
    // Pega SHA atual se não tiver
    if (!ghSHA) {
      const r = await fetch(GH_API, {
        headers: { Authorization: `Bearer ${ghToken}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (r.ok) { const j = await r.json(); ghSHA = j.sha; }
    }
    D.atualizado = new Date().toISOString();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(D, null, 2))));
    const r = await fetch(GH_API, {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${ghToken}`,
        'Content-Type': 'application/json',
        Accept: 'application/vnd.github.v3+json',
      },
      body: JSON.stringify({
        message: `[admin] ${new Date().toLocaleString('pt-BR')}`,
        content,
        sha: ghSHA,
      }),
    });
    if (r.ok) {
      const j = await r.json();
      ghSHA = j.content.sha;
      const hora = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      setSaveStatus('ok', '☁️', `Publicado às ${hora}`);
    } else {
      const err = await r.json().catch(()=>({}));
      setSaveStatus('err', '✗', err.message || 'Erro GitHub');
    }
  } catch(e) {
    setSaveStatus('err', '✗', 'Sem conexão');
  }
}

// ── Auto-save com debounce ────────────────────────────────
function autoSave(delay=400) {
  if (!modoLocal && !modoGitHub) {
    configurarGitHub();
    return;
  }
  if (saveTimer) clearTimeout(saveTimer);
  setSaveStatus('saving', '⏳', 'Salvando...');
  saveTimer = setTimeout(async () => {
    if (modoLocal) {
      try {
        D.atualizado = new Date().toISOString();
        const r = await fetch(`${SERVER_URL}/api/save`, {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(D), signal: AbortSignal.timeout(5000),
        });
        const j = await r.json();
        if (j.ok) {
          const hora = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
          setSaveStatus('ok', '✓', `Salvo às ${hora}`);
        } else setSaveStatus('err', '✗', 'Erro ao salvar');
      } catch(e) { setSaveStatus('err', '✗', 'Sem conexão com servidor'); }
    } else {
      await salvarGitHub();
    }
  }, delay);
}

async function sha256(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
async function doLogin(){
  const pwd=document.getElementById('pwd').value;
  const h=await sha256(pwd);
  if(h===ADMIN_HASH){
    if(document.getElementById('rem').checked)
      localStorage.setItem('luzi_adm',JSON.stringify({v:1,exp:Date.now()+30*864e5}));
    else sessionStorage.setItem('luzi_adm_s','1');
    showDash();
  } else {
    document.getElementById('login-err').style.display='block';
    document.getElementById('pwd').value='';
  }
}
function logout(){
  localStorage.removeItem('luzi_adm');
  sessionStorage.removeItem('luzi_adm_s');
  document.getElementById('v-login').classList.remove('hidden');
  document.getElementById('v-dash').classList.add('hidden');
  document.getElementById('badge-adm').classList.add('hidden');
  document.getElementById('btn-sair').classList.add('hidden');
}
function checkSession(){
  const s=localStorage.getItem('luzi_adm');
  if(s){const d=JSON.parse(s);if(d.v&&d.exp>Date.now())return true;localStorage.removeItem('luzi_adm');}
  return !!sessionStorage.getItem('luzi_adm_s');
}
function showDash(){
  document.getElementById('v-login').classList.add('hidden');
  document.getElementById('v-dash').classList.remove('hidden');
  document.getElementById('badge-adm').classList.remove('hidden');
  document.getElementById('btn-sair').classList.remove('hidden');

  loadData().then(()=>{ renderAll(); loadGerData(); });
}

async function loadData(){
  try {
    if (modoLocal) {
      const r = await fetch(`${SERVER_URL}/api/data`);
      if (r.ok) { D = await r.json(); }
    } else if (modoGitHub && ghToken) {
      const r = await fetch(GH_API, {
        headers: { Authorization: `Bearer ${ghToken}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (r.ok) {
        const j = await r.json();
        ghSHA = j.sha;
        D = JSON.parse(decodeURIComponent(escape(atob(j.content))));
      }
    } else {
      const r = await fetch('data.json?t='+Date.now());
      if (r.ok) { D = await r.json(); }
    }
  } catch(e) { /* usa DATA_BASE */ }
  D.usinas     = (D.usinas    && D.usinas.length)    ? D.usinas    : DATA_BASE.usinas;
  D.clientes   = (D.clientes  && D.clientes.length)  ? D.clientes  : DATA_BASE.clientes;
  D.status_ucs = D.status_ucs || {};
  // Se data.json tiver histórico de faturas, sobrescreve o FATURAS_DB hardcoded
  if (D.faturas && Object.keys(D.faturas).length > 0) {
    FATURAS_DB = D.faturas;
  }
}

async function refreshData(){
  await loadData();
  renderAll();
}

const R$=v=>v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const dtBR=iso=>{const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`};
function hoje0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function diasAte(iso){const v=new Date(iso);v.setHours(0,0,0,0);return Math.round((v-hoje0())/86400000);}
// Status dinâmico: se 'vencer' mas data já passou → 'vencido'
function computeStatus(f){
  if(f.status==='pago'||f.status==='cancelado') return f.status;
  const h=hoje0(), v=new Date(f.venc+'T00:00:00'); v.setHours(0,0,0,0);
  return v<h?'vencido':'vencer';
}
function toast(msg,dur=2500){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),dur);
}

// Status da UC: calcula pipeline baseado em status_ucs + data da fatura
function getUCStatus(c){
  const st=D.status_ucs[c.uc]||{};
  const hoje=hoje0();

  // Próxima fatura esperada
  const mes=hoje.getMonth(), ano=hoje.getFullYear(), dia=hoje.getDate();
  let nextFat=new Date(ano,mes,c.dg);
  if(dia>c.dg) nextFat=new Date(ano,mes+1,c.dg);
  const diasFat=Math.round((nextFat-hoje)/86400000);

  // Determina status geral
  let icone='⚪', cor='c-muted', legenda='Sem dados';
  if(st.pago){icone='✅';cor='c-green';legenda='Em dia';}
  else if(st.fatura_chegou&&st.boleto_emitido&&st.wpp_enviado){icone='🟡';cor='c-yellow';legenda='Aguardando pagamento';}
  else if(st.fatura_chegou&&!st.boleto_emitido){icone='🔵';cor='c-teal';legenda='Boleto pendente';}
  else if(!st.fatura_chegou&&diasFat<-5){icone='🔴';cor='c-red';legenda='Fatura em atraso';}
  else if(!st.fatura_chegou&&diasFat<=3&&diasFat>=0){icone='🟠';cor='c-yellow';legenda='Fatura chegando';}
  else if(!st.fatura_chegou){icone='⚪';cor='c-muted';legenda='Aguardando fatura';}

  return {icone,cor,legenda,st,diasFat,nextFat};
}

}

// ── Cobranças
let cobFiltro='todos';

function renderCobrancas(filtro){
  if(filtro!==undefined) cobFiltro=filtro;
  let all=[];
  Object.values(FATURAS_DB).forEach(cli=>{
    cli.faturas.forEach(f=>{
      all.push({...f, clienteNome:cli.nome, clienteDoc:cli.doc, clienteUC:cli.uc});
    });
  });
  if(cobFiltro==='aberto')     all=all.filter(f=>computeStatus(f)==='vencer');
  else if(cobFiltro==='pago')      all=all.filter(f=>computeStatus(f)==='pago');
  else if(cobFiltro==='vencido')   all=all.filter(f=>computeStatus(f)==='vencido');
  else if(cobFiltro==='cancelado') all=[];

  all.sort((a,b)=>b.venc.localeCompare(a.venc));

  if(all.length===0){
    document.getElementById('cob-list').innerHTML=`<div class="cob-empty">Nenhuma cobrança nesta categoria.</div>`;
    return;
  }

  // Agrupa por mês de vencimento
  const groups={};
  all.forEach(f=>{
    const k=f.venc.substring(0,7);
    if(!groups[k]) groups[k]=[];
    groups[k].push(f);
  });
  const meses=['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  let html='';
  Object.keys(groups).sort().reverse().forEach(k=>{
    const [y,m]=k.split('-');
    html+=`<div class="cob-group-hdr">${meses[+m]} ${y}</div>`;
    groups[k].forEach(f=>{
      const cs=computeStatus(f);
      const sLabel=cs==='pago'?'Pago':cs==='vencer'?'Em aberto':'Vencido';
      const sCls=cs==='pago'?'cb-pago':cs==='vencer'?'cb-aberto':'cb-vencido';
      html+=`<div class="cob-row">
        <div class="cob-ico">📄</div>
        <div class="cob-info">
          <div class="cob-type">Boleto · ${f.mes}</div>
          <div class="cob-client">${f.clienteNome}</div>
          <div class="cob-doc">${fmtDoc(f.clienteDoc)}</div>
        </div>
        <div class="cob-venc">Vencimento<br><strong>${dtBR(f.venc)}</strong></div>
        <div class="cob-valor">${R$(f.comDesc)}</div>
        <span class="cob-badge ${sCls}">${sLabel}</span>
      </div>`;
    });
  });
  document.getElementById('cob-list').innerHTML=html;
}

function filtrarCobrancas(filtro,btn){
  document.querySelectorAll('.cob-stab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderCobrancas(filtro);
}

function fmtDoc(doc){
  if(!doc) return '—';
  const d=doc.replace(/\D/g,'');
  if(d.length===11) return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
  return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
}

// ── Modal Usina ──────────────────────────────────────────
let editUsinaIdx = null;

function abrirModalUsina(idx=null){
  editUsinaIdx = idx;
  const u = idx!==null ? D.usinas[idx] : {};
  document.getElementById('modal-usina-title').textContent = idx!==null ? 'Editar usina' : 'Adicionar usina';
  document.getElementById('fu-nome').value   = u.nome||'';
  document.getElementById('fu-id').value     = u.id||'';
  document.getElementById('fu-uc').value     = u.uc||'';
  document.getElementById('fu-prod').value   = u.prod_media!=null?u.prod_media:'';
  document.getElementById('fu-prod30d').value= u.prod_30d!=null?u.prod_30d:'';
  document.getElementById('fu-prod-mes').value= u.prod_mes!=null?u.prod_mes:'';
  document.getElementById('fu-loc').value    = u.loc||'';
  document.getElementById('fu-status').value = u.status||'em construção';
  // Desabilita edição do ID em modo edição
  document.getElementById('fu-id').disabled = idx!==null;
  renderRateioRows(u.rateio||[]);
  document.getElementById('modal-usina-overlay').classList.remove('hidden');
}

function fecharModalUsina(){
  document.getElementById('modal-usina-overlay').classList.add('hidden');
  editUsinaIdx=null;
}

function renderRateioRows(rateio){
  document.getElementById('fu-rateio-rows').innerHTML = rateio.map((r,i)=>`
    <div class="form-grid" id="rrow-${i}" style="margin-bottom:8px;padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)">
      <div class="form-group"><label class="form-label" style="font-size:10px">UC consumidora</label>
        <input class="form-input" style="padding:8px 10px;font-size:13px" id="rr-nome-${i}" value="${r.nome||''}"></div>
      <div class="form-group"><label class="form-label" style="font-size:10px">UC Equatorial</label>
        <input class="form-input" style="padding:8px 10px;font-size:13px" id="rr-uc-${i}" value="${r.uc||''}"></div>
      <div class="form-group"><label class="form-label" style="font-size:10px">UC Faturamento</label>
        <input class="form-input" style="padding:8px 10px;font-size:13px" id="rr-ucb-${i}" value="${r.uc_billing||''}"></div>
      <div class="form-group"><label class="form-label" style="font-size:10px">% Créditos</label>
        <input class="form-input" style="padding:8px 10px;font-size:13px" type="number" min="0" max="100" id="rr-pct-${i}" value="${r.pct||0}"></div>
      <div class="form-group" style="display:flex;align-items:flex-end">
        <button class="btn-remover" style="width:100%;justify-content:center" onclick="removerRateioRow(${i})">✕ Remover</button>
      </div>
    </div>`).join('');
}

function addRateioRow(){
  const rows = document.querySelectorAll('[id^="rrow-"]');
  const i = rows.length;
  const div = document.createElement('div');
  div.className='form-grid'; div.id=`rrow-${i}`;
  div.style.cssText='margin-bottom:8px;padding:12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)';
  div.innerHTML=`
    <div class="form-group"><label class="form-label" style="font-size:10px">UC consumidora</label>
      <input class="form-input" style="padding:8px 10px;font-size:13px" id="rr-nome-${i}" value=""></div>
    <div class="form-group"><label class="form-label" style="font-size:10px">UC Equatorial</label>
      <input class="form-input" style="padding:8px 10px;font-size:13px" id="rr-uc-${i}" value=""></div>
    <div class="form-group"><label class="form-label" style="font-size:10px">UC Faturamento</label>
      <input class="form-input" style="padding:8px 10px;font-size:13px" id="rr-ucb-${i}" value=""></div>
    <div class="form-group"><label class="form-label" style="font-size:10px">% Créditos</label>
      <input class="form-input" style="padding:8px 10px;font-size:13px" type="number" min="0" max="100" id="rr-pct-${i}" value="0"></div>
    <div class="form-group" style="display:flex;align-items:flex-end">
      <button class="btn-remover" style="width:100%;justify-content:center" onclick="removerRateioRow(${i})">✕ Remover</button>
    </div>`;
  document.getElementById('fu-rateio-rows').appendChild(div);
}

function removerRateioRow(i){
  const el = document.getElementById(`rrow-${i}`);
  if(el) el.remove();
  // renumerar IDs
  const remaining = document.querySelectorAll('[id^="rrow-"]');
  remaining.forEach((row,ni)=>{
    row.id=`rrow-${ni}`;
    ['nome','uc','ucb','pct'].forEach(f=>{
      const inp=row.querySelector(`[id^="rr-${f}-"]`);
      if(inp) inp.id=`rr-${f}-${ni}`;
    });
    const btn=row.querySelector('.btn-remover');
    if(btn) btn.setAttribute('onclick',`removerRateioRow(${ni})`);
  });
}

function coletarRateioModal(){
  const rows = document.querySelectorAll('[id^="rrow-"]');
  return Array.from(rows).map((_,i)=>({
    nome: (document.getElementById(`rr-nome-${i}`)?.value||'').trim(),
    uc:   (document.getElementById(`rr-uc-${i}`)?.value||'').trim(),
    uc_billing: (document.getElementById(`rr-ucb-${i}`)?.value||'').trim()||null,
    pct:  +(document.getElementById(`rr-pct-${i}`)?.value||0),
  })).filter(r=>r.nome||r.uc);
}

function salvarUsina(){
  const nome = document.getElementById('fu-nome').value.trim();
  const id   = editUsinaIdx!==null
    ? D.usinas[editUsinaIdx].id
    : document.getElementById('fu-id').value.trim().toLowerCase().replace(/\s+/g,'_');
  if(!nome||!id){toast('❌ Nome e ID são obrigatórios',2500);return;}
  const nu = {
    id,
    nome,
    uc:          document.getElementById('fu-uc').value.trim()||null,
    loc:         document.getElementById('fu-loc').value.trim(),
    prod_media:  document.getElementById('fu-prod').value     ? +document.getElementById('fu-prod').value     : null,
    prod_30d:    document.getElementById('fu-prod30d').value  ? +document.getElementById('fu-prod30d').value  : null,
    prod_mes:    document.getElementById('fu-prod-mes').value ? +document.getElementById('fu-prod-mes').value : null,
    status:      document.getElementById('fu-status').value,
    rateio:      coletarRateioModal(),
  };
  if(editUsinaIdx!==null) D.usinas[editUsinaIdx]=nu;
  else D.usinas.push(nu);
  fecharModalUsina();
  renderAll();
  autoSave(200);
  toast('✅ Usina salva!');
}

function removerUsina(i){
  if(!confirm('Remover usina "'+D.usinas[i].nome+'"? Esta ação não pode ser desfeita.')) return;
  D.usinas.splice(i,1);
  renderAll();
  autoSave(200);
  toast('🗑 Usina removida');
}

function somaRateio(usina_id){
  const u=D.usinas.find(x=>x.id===usina_id);
  if(!u||!u.rateio) return 0;
  return u.rateio.reduce((s,r)=>s+(+r.pct),0);
}

function atualizarPct(usina_id,ri,val){
  const u=D.usinas.find(x=>x.id===usina_id);
  if(!u) return;
  u.rateio[ri].pct=+val;
  const bar=document.getElementById(`bar-${usina_id}-${ri}`);
  if(bar) bar.style.width=Math.min(100,+val)+'%';
  const tot=document.getElementById(`tot-${usina_id}`);
  const soma=somaRateio(usina_id);
  if(tot){tot.textContent=soma+'%';tot.className=soma===100?'c-green':'c-red';}
  autoSave(1000);
}

function salvarRateio(usina_id){
  const soma=somaRateio(usina_id);
  if(soma!==100){toast('❌ Total deve ser 100%. Atual: '+soma+'%',3000);return;}
  autoSave(200);
  toast('✅ Rateio salvo!');
}

let selectedCliente = null;
const chartsAdm = {};

function renderClientes(){
  const sidebar = document.getElementById('cl-sidebar-list');
  if(!sidebar) return;
  sidebar.innerHTML = D.clientes.map((c,i)=>{
    const fdb = Object.values(FATURAS_DB).find(f=>f.uc===c.uc||f.doc===c.doc);
    const ultima = fdb&&fdb.faturas.length>0 ? fdb.faturas[0] : null;
    const cs = ultima ? computeStatus(ultima) : null;
    const dot = cs==='vencer'?'🟡':cs==='vencido'?'🔴':cs==='pago'?'🟢':'⚪';
    return `<div class="cl-sidebar-item${selectedCliente===i?' active':''}" onclick="selectCliente(${i})">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:11px">${dot}</span>
        <span class="cl-sidebar-name">${c.nome}</span>
      </div>
      <div class="cl-sidebar-uc">UC ${c.uc}</div>

  renderDetailPanel();
}

  if(chartsAdm[selectedCliente]!==undefined){chartsAdm[selectedCliente].destroy();delete chartsAdm[selectedCliente];}
  selectedCliente = (selectedCliente===i) ? null : i;
  renderClientes();
}

  const tipoLabel = c.tipo==='cliente_ativo'?'Ativo':c.tipo==='pass_through'?'Repasse':'Próprio';

    <div class="detail-grid" style="margin-bottom:18px">
      <div class="dg-item"><div class="dg-lbl">Cliente</div><div class="dg-val">${c.cliente||'—'}</div></div>
      <div class="dg-item"><div class="dg-lbl">CPF / CNPJ</div><div class="dg-val" style="font-size:12px;font-family:monospace">${c.doc?fmtDoc(c.doc):'—'}</div></div>
      <div class="dg-item"><div class="dg-lbl">Desconto</div><div class="dg-val-big">${c.desc!=null?c.desc+'%':'—'}</div></div>
      <div class="dg-item"><div class="dg-lbl">Usina</div><div class="dg-val">${c.usina||'—'}</div></div>
      <div class="dg-item"><div class="dg-lbl">Próx. fatura</div><div class="dg-val" style="font-size:12px">${nextFat.toLocaleDateString('pt-BR')} ${diasFat===0?'(hoje)':diasFat>0?'(em '+diasFat+'d)':'('+-diasFat+'d atrás)'}</div></div>

function renderChartAdm(c,i){
  const fdb=Object.values(FATURAS_DB).find(f=>f.uc===c.uc||f.doc===c.doc);
  if(!fdb||!fdb.faturas||fdb.faturas.length===0) return;
  const sorted=[...fdb.faturas].reverse();
  const ctx=document.getElementById(`chart-adm-${i}`);
  if(!ctx) return;
  if(chartsAdm[i]) chartsAdm[i].destroy();
  chartsAdm[i]=new Chart(ctx,{
    type:'bar',
    data:{
      labels:sorted.map(f=>f.ref),
      datasets:[
        {label:'Sem desconto',data:sorted.map(f=>f.semDesc),backgroundColor:'rgba(245,158,11,.2)',borderColor:'#f59e0b',borderWidth:1.5,borderRadius:3},
        {label:'Com desconto',data:sorted.map(f=>f.comDesc),backgroundColor:'rgba(78,205,228,.2)',borderColor:'#4ecde4',borderWidth:1.5,borderRadius:3},
        {label:'Economia',data:sorted.map(f=>+(f.semDesc-f.comDesc).toFixed(2)),type:'line',borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.07)',borderWidth:2,tension:.3,pointBackgroundColor:'#22c55e',fill:true,yAxisID:'y2'},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:'rgba(26,45,80,.5)'},ticks:{color:'#7a9bb5',font:{size:10}}},
        y:{grid:{color:'rgba(26,45,80,.5)'},ticks:{color:'#7a9bb5',font:{size:10},callback:v=>'R$'+v.toLocaleString('pt-BR')},beginAtZero:true},
        y2:{display:false,beginAtZero:true}
      }
    }
  });
}

// MODAL CLIENTE
// ═══════════════════════════════════════════════════════
function abrirModal(idx=null){
  editIdx=idx;
  const title=document.getElementById('modal-title');
  title.textContent=idx!==null?'Editar cliente':'Adicionar cliente';
  const c=idx!==null?D.clientes[idx]:{};
  document.getElementById('f-nome').value=c.nome||'';
  document.getElementById('f-uc').value=c.uc||'';
  document.getElementById('f-cliente').value=c.cliente||'';
  document.getElementById('f-doc').value=c.doc||'';
  document.getElementById('f-wpp').value=c.wpp||'';
  document.getElementById('f-desc').value=c.desc!=null?c.desc:'';
  document.getElementById('f-tipo').value=c.tipo||'cliente_ativo';
  document.getElementById('f-acao').value=c.acao||'luzi_boleto_e_png';
  document.getElementById('f-usina').value=c.usina||'';
  document.getElementById('f-dg').value=c.dg||'';
  document.getElementById('f-metodo').value=c.metodo||'planilha_injecao';
  document.getElementById('f-contrato').value=c.contrato||'';
  document.getElementById('f-obs').value=c.obs||'';
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function fecharModal(){document.getElementById('modal-overlay').classList.add('hidden');editIdx=null;}
function salvarCliente(){
  const nc={
    nome:document.getElementById('f-nome').value.trim(),
    uc:document.getElementById('f-uc').value.trim(),
    cliente:document.getElementById('f-cliente').value.trim(),
    doc:document.getElementById('f-doc').value.trim(),
    wpp:document.getElementById('f-wpp').value.trim(),
    desc:document.getElementById('f-desc').value!==''?+document.getElementById('f-desc').value:null,
    tipo:document.getElementById('f-tipo').value,
    acao:document.getElementById('f-acao').value,
    usina:document.getElementById('f-usina').value||null,
    dg:+document.getElementById('f-dg').value||null,
    metodo:document.getElementById('f-metodo').value,
    contrato:document.getElementById('f-contrato').value.trim()||null,
    obs:document.getElementById('f-obs').value.trim(),
  };
  if(!nc.nome||!nc.uc){toast('❌ Nome e UC são obrigatórios',2500);return;}
  if(editIdx!==null) D.clientes[editIdx]=nc;
  else D.clientes.push(nc);
  fecharModal();
  renderAll();
  autoSave(200);
  toast(modoLocal?'✅ Salvando e publicando...':'✅ Cliente salvo (inicie o servidor para publicar)');
}
function removerCliente(i){
  if(!confirm('Remover "'+D.clientes[i].nome+'"?')) return;
  if(selectedCliente===i) selectedCliente=null;
  else if(selectedCliente!==null&&selectedCliente>i) selectedCliente--;
  D.clientes.splice(i,1);
  renderAll();
  autoSave(200);
}

// ═══════════════════════════════════════════════════════
// PRODUÇÃO SOLAR — gráfico individual por usina
// ═══════════════════════════════════════════════════════
let gerData = null;
const usinaCharts  = {};
const usinaFilters = {}; // {id: {from:'YYYY-MM-DD'|null, to:'YYYY-MM-DD'|null}}

// Converte #rrggbb → rgba(r,g,b,a)
function hexRgba(hex, a){
  if(!hex||hex[0]!=='#') return `rgba(78,205,228,${a})`;
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

async function loadGerData(){
  // Feedback visual no botão de atualizar
  const btn = document.querySelector('[onclick="loadGerData()"]');
  if(btn){ btn.textContent='⏳ Carregando...'; btn.disabled=true; }
  try{
    const r = await fetch('./geracao_data.json?_='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    gerData = await r.json();
    renderUsinas();
    setTimeout(initAllUsinaCharts, 150);
    if(btn){ btn.textContent='↻ Atualizar geração'; btn.disabled=false; }
  }catch(e){
    console.error('loadGerData:', e.message);
    if(btn){ btn.textContent='⚠️ Erro ao carregar'; btn.disabled=false; }
    // Exibir erro dentro do conteúdo
    const el = document.getElementById('usinas-content');
    if(el && !gerData){
      const errDiv = el.querySelector('.ger-err');
      if(!errDiv){
        const d = document.createElement('div');
        d.className='ger-err';
        d.style.cssText='padding:12px 20px;font-size:12px;color:var(--red);background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;margin-bottom:16px';
        d.textContent='⚠️ Não foi possível carregar geracao_data.json — '+e.message;
        el.prepend(d);
      }
    }
  }
}

function initAllUsinaCharts(){
  D.usinas.forEach(u=>renderUsinaChart(u.id));
}

function renderUsinaChart(id){
  const gd     = gerData && gerData.usinas && gerData.usinas[id];
  const canvas  = document.getElementById('chart-'+id);
  const nodata  = document.getElementById('nodata-'+id);
  const statVal = document.getElementById('stat-val-'+id);
  const statLbl = document.getElementById('stat-lbl-'+id);
  if(!canvas) return;

  const hojeIso = new Date().toISOString().slice(0,10);
  const f       = usinaFilters[id] || {from:null, to:null};

  // Sem integração para esta usina
  if(!gd){
    canvas.style.display = 'none';
    if(nodata) { nodata.style.display='block'; nodata.textContent='Sem integração de geração'; }
    if(statVal) statVal.textContent = '—';
    if(statLbl) statLbl.textContent = 'aguardando integração';
    return;
  }

  const hist = gd.historico || {};
  const cor  = gd.cor || '#4ecde4';

  // Montar série de datas
  let datas = [];
  if(f.from || f.to){
    // Modo filtro: todas as datas entre from e to
    const dtFrom = f.from || Object.keys(hist).sort()[0] || hojeIso;
    const dtTo   = f.to   || hojeIso;
    const cur = new Date(dtFrom+'T00:00:00');
    const end = new Date(dtTo  +'T00:00:00');
    while(cur <= end){ datas.push(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }
  } else {
    // Padrão: últimos 30 dias (ou toda a história se < 30 dias)
    const allDates = Object.keys(hist).sort();
    const earliest = allDates[0] || hojeIso;
    const startDefault = new Date(hojeIso+'T00:00:00'); startDefault.setDate(startDefault.getDate()-29);
    const start = earliest > startDefault.toISOString().slice(0,10) ? earliest : startDefault.toISOString().slice(0,10);
    const cur = new Date(start+'T00:00:00');
    const end = new Date(hojeIso+'T00:00:00');
    while(cur <= end){ datas.push(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }
  }

  const values = datas.map(d=>hist[d]||0);
  const labels = datas.map(d=>{ const[,m,day]=d.split('-'); return `${day}/${m}`; });

  // Atualizar stat acima do gráfico
  if(statVal && statLbl){
    if(f.from || f.to){
      const total = values.reduce((s,v)=>s+v,0);
      statVal.textContent = total.toFixed(1)+' kWh';
      const dtFrom = f.from || datas[0];
      const dtTo   = f.to   || datas[datas.length-1];
      statLbl.textContent = `${dtBR(dtFrom)} → ${dtBR(dtTo)}`;
    } else {
      const hojeKwh = hist[hojeIso] ?? 0;
      statVal.textContent = hojeKwh.toFixed(1)+' kWh';
      statLbl.textContent = 'hoje · '+dtBR(hojeIso);
    }
  }

  // Sempre mostrar gráfico (linha plana se zeros)
  canvas.style.display = 'block';
  if(nodata) nodata.style.display = 'none';

  if(usinaCharts[id]){ usinaCharts[id].destroy(); delete usinaCharts[id]; }

  const ctx  = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,200);
  grad.addColorStop(0,    hexRgba(cor, 0.36));
  grad.addColorStop(0.65, hexRgba(cor, 0.07));
  grad.addColorStop(1,    hexRgba(cor, 0.0));

  usinaCharts[id] = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[{
        data: values,
        borderColor:     cor,
        backgroundColor: grad,
        borderWidth: 2,
        tension: 0.42,
        fill: true,
        pointRadius:           values.length > 60 ? 0 : 3,
        pointHoverRadius:      6,
        pointBackgroundColor:  cor,
        pointBorderColor:      'transparent',
        pointHoverBorderColor: '#fff',
        pointHoverBorderWidth: 1.5,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      interaction:{mode:'index', intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(10,16,32,.97)',
          titleColor:'#c8d4e8', bodyColor:cor,
          borderColor:hexRgba(cor,.25), borderWidth:1, padding:10,
          callbacks:{ label:c=>'  '+c.parsed.y.toFixed(2)+' kWh' }
        }
      },
      scales:{
        x:{ ticks:{color:'#8b9cb6',font:{size:9,family:"'Barlow Condensed',sans-serif"},maxRotation:0,maxTicksLimit:12},
            grid:{color:'rgba(255,255,255,.03)'}, border:{color:'rgba(255,255,255,.07)'} },
        y:{ ticks:{color:'#8b9cb6',font:{size:9},callback:v=>v===0?'0':v.toFixed(0)},
            grid:{color:'rgba(255,255,255,.04)'}, border:{color:'rgba(255,255,255,.07)'},
            beginAtZero:true }
      }
    }
  });
}

function filtrarUsinaChart(id){
  const from = document.getElementById('dt-from-'+id)?.value || null;
  const to   = document.getElementById('dt-to-'+id)?.value   || null;
  usinaFilters[id] = {from, to};
  renderUsinaChart(id);
}

function resetUsinaChart(id){
  usinaFilters[id] = {from:null, to:null};
  const f = document.getElementById('dt-from-'+id);
  const t = document.getElementById('dt-to-'+id);
  if(f) f.value=''; if(t) t.value='';
  renderUsinaChart(id);
}
